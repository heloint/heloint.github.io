<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- JQuery -->
    <script src="https://code.jquery.com/jquery-3.6.3.min.js"></script>

    <!-- Boostrap-->
    <link rel="stylesheet" href="./vendors/bootstrap/bootstrap.min.css" />
    <script src="./vendors/bootstrap/bootstrap.bundle.min.js" defer></script>

    <!-- Bootswatch  -->
    <link rel="stylesheet" src="./vendors/bootswatch/bootstrap.min.css" />

    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/navbar.css" />
    <link rel="stylesheet" href="./css/carousel.css" />
    <link rel="stylesheet" href="./css/footer.css" />

    <title>Candida Mine</title>
  </head>

  <body>
    <!-- Include components -->
    <div data-include="header"></div>
    <div data-include="carousel"></div>
    <div data-include="queries-analyse"></div>
    <div data-include="footer"></div>

    <!-- LOAD HTML SNIPPETS -->
    <script>
      $(function () {
        var includes = $("[data-include]");
        $.each(includes, function () {
          var file = "components/" + $(this).data("include") + ".html";
          $(this).load(file);
        });
      });
    </script>
    <!-- END:LOAD HTML SNIPPETS -->
  </body>
</html>
