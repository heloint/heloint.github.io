<!-- CAROUSEL -->
<section id="carouselIndicators" class="carousel slide" data-bs-ride="true">
  <div class="carousel-indicators">
    <button
      type="button"
      data-bs-target="#carouselIndicators"
      data-bs-slide-to="0"
      class="active"
      aria-current="true"
      aria-label="Slide 1"
    ></button>
    <button
      type="button"
      data-bs-target="#carouselIndicators"
      data-bs-slide-to="1"
      aria-label="Slide 2"
    ></button>
    <button
      type="button"
      data-bs-target="#carouselIndicators"
      data-bs-slide-to="2"
      aria-label="Slide 3"
    ></button>
    <button
      type="button"
      data-bs-target="#carouselIndicators"
      data-bs-slide-to="3"
      aria-label="Slide 4"
    ></button>
  </div>
  <div class="carousel-inner">
    <div class="carousel-item active">
      <div class="carousel-caption" style="bottom: initial">
        <h3>Welcome to Candida Mine!</h3>
        <p>Data warehouse for Candida Species genomes and transcriptomes.</p>
        <p>
          For more information see
          <a
            class="carousel-caption-link"
            href="https://candidamine.readthedocs.io/en/latest/index.html"
            target="_blank"
            >User Guide
          </a>
        </p>
      </div>
      <img
        class="d-block w-100"
        src="./images/banner-slide-images/2-candida-albicans.jpg"
        style=""
        alt="First slide"
      />
    </div>
    <div class="carousel-item">
      <img
        class="d-block w-100"
        src="./images/banner-slide-images/intermine.jpg"
        style="max-height: 25rem"
        alt="First slide"
      />
    </div>
    <div class="carousel-item">
      <img
        class="d-block w-100"
        src="./images/banner-slide-images/4-candida-albicans.jpg"
        style=""
        alt="First slide"
      />
    </div>
    <div class="carousel-item">
      <img
        class="d-block w-100"
        src="./images/banner-slide-images/c-albicans.png"
        style=""
        alt="First slide"
      />
    </div>
  </div>
  <button
    class="carousel-control-prev"
    type="button"
    data-bs-target="#carouselIndicators"
    data-bs-slide="prev"
  >
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>
  <button
    class="carousel-control-next"
    type="button"
    data-bs-target="#carouselIndicators"
    data-bs-slide="next"
  >
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
</section>
<!-- END:CAROUSEL -->
